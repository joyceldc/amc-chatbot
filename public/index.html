<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AMC Chatbot</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0f11;
      --surface: #17191e;
      --surface2: #1f2128;
      --border: #2a2d36;
      --accent: #e8b86d;
      --accent2: #c9965a;
      --text: #f0ede8;
      --muted: #7a7f8e;
      --user-bg: #e8b86d;
      --user-text: #0e0f11;
      --bot-bg: #1f2128;
      --radius: 18px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* Ambient background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 20% 10%, rgba(232,184,109,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 50% 50% at 80% 90%, rgba(201,150,90,0.05) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .chat-wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 680px;
      height: 100dvh;
      max-height: 820px;
      display: flex;
      flex-direction: column;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 32px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.03);
      animation: slideUp 0.5s cubic-bezier(0.22,1,0.36,1);
    }

    @media (max-width: 700px) {
      .chat-wrapper {
        border-radius: 0;
        max-height: 100dvh;
        border-left: none;
        border-right: none;
      }
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 18px;
      box-shadow: 0 0 0 3px rgba(232,184,109,0.15);
    }

    .header-info h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.15rem;
      font-weight: 400;
      letter-spacing: 0.01em;
      color: var(--text);
    }

    .status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.72rem;
      color: var(--muted);
      font-weight: 400;
      margin-top: 2px;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #4caf7d;
      box-shadow: 0 0 6px #4caf7d;
      animation: pulse 2.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* Messages */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

    .msg {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: var(--surface2);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      flex-shrink: 0;
    }

    .msg.bot .msg-avatar {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
    }

    .bubble {
      max-width: 75%;
      padding: 13px 17px;
      border-radius: 16px;
      font-size: 0.9rem;
      line-height: 1.65;
      font-weight: 300;
    }

    .msg.bot .bubble {
      background: var(--bot-bg);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
      color: var(--text);
    }

    .msg.user .bubble {
      background: var(--accent);
      color: var(--user-text);
      border-bottom-right-radius: 4px;
      font-weight: 400;
    }

    /* Typing indicator */
    .typing .bubble {
      padding: 16px 20px;
    }

    .dots {
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .dots span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--muted);
      animation: bounce 1.2s ease-in-out infinite;
    }

    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-6px); opacity: 1; }
    }

    /* Input area */
    .input-area {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    textarea {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 14px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 300;
      padding: 12px 16px;
      resize: none;
      outline: none;
      max-height: 120px;
      line-height: 1.5;
      transition: border-color 0.2s;
    }

    textarea::placeholder { color: var(--muted); }

    textarea:focus {
      border-color: rgba(232, 184, 109, 0.5);
    }

    button {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s, transform 0.15s;
    }

    button:hover { background: var(--accent2); }
    button:active { transform: scale(0.92); }
    button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    button svg { display: block; }

    .footer-note {
      text-align: center;
      font-size: 0.68rem;
      color: var(--muted);
      padding: 8px 20px 12px;
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>

<div class="chat-wrapper">

  <div class="header">
    <div class="avatar">✦</div>
    <div class="header-info">
      <h1>AMC Assistant</h1>
      <div class="status">
        <div class="status-dot"></div>
        Online &amp; ready to help
      </div>
    </div>
  </div>

  <div class="messages" id="messages">
    <div class="msg bot">
      <div class="msg-avatar">✦</div>
      <div class="bubble">Hi there! I'm the AMC Assistant. How can I help you today?</div>
    </div>
  </div>

  <div class="input-area">
    <textarea
      id="input"
      placeholder="Type your message…"
      rows="1"
      onInput="autoResize(this)"
      onKeyDown="handleKey(event)"
    ></textarea>
    <button id="sendBtn" onclick="sendMessage()" title="Send">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#0e0f11" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>

  <div class="footer-note">AMC Chatbot · Powered by GPT-4o mini</div>

</div>

<script>
  const messagesEl = document.getElementById('messages');
  const input = document.getElementById('input');
  const sendBtn = document.getElementById('sendBtn');

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function appendMessage(role, text) {
    const msg = document.createElement('div');
    msg.className = `msg ${role}`;

    const avatarEl = document.createElement('div');
    avatarEl.className = 'msg-avatar';
    avatarEl.textContent = role === 'bot' ? '✦' : '👤';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;

    msg.appendChild(avatarEl);
    msg.appendChild(bubble);
    messagesEl.appendChild(msg);
    scrollToBottom();
    return msg;
  }

  function showTyping() {
    const msg = document.createElement('div');
    msg.className = 'msg bot typing';
    msg.id = 'typing-indicator';

    const avatarEl = document.createElement('div');
    avatarEl.className = 'msg-avatar';
    avatarEl.textContent = '✦';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = '<div class="dots"><span></span><span></span><span></span></div>';

    msg.appendChild(avatarEl);
    msg.appendChild(bubble);
    messagesEl.appendChild(msg);
    scrollToBottom();
  }

  function removeTyping() {
    const el = document.getElementById('typing-indicator');
    if (el) el.remove();
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;

    input.value = '';
    input.style.height = 'auto';
    sendBtn.disabled = true;

    appendMessage('user', text);
    showTyping();

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text }),
      });

      const data = await res.json();
      removeTyping();

      if (data.reply) {
        appendMessage('bot', data.reply);
      } else {
        appendMessage('bot', `Error: ${data.error || 'Something went wrong.'}`);
      }
    } catch (err) {
      removeTyping();
      appendMessage('bot', 'Could not connect to the server. Please try again.');
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  }
</script>

</body>
</html>
